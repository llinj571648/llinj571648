<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>导航站</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* 左侧分类栏 */
#sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100vh;
  background: #111827;
  padding: 10px;
  overflow-y: auto;
}

.category {
  padding: 10px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 6px;
  color: #cbd5e1;
}

.category:hover {
  background: #1f2937;
}

/* 主内容 */
#content {
  margin-left: 240px;
  padding: 20px;
}

.item {
  background: #1e293b;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
}

a {
  color: #60a5fa;
  text-decoration: none;
}

small {
  display: block;
  margin-top: 4px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div id="sidebar"></div>
<div id="content">
  <h2>请选择分类</h2>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
