<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>导航站</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* 左侧分类栏 */
#sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100vh;
  background: #111827;
  padding: 10px;
  overflow-y: auto;
  box-sizing: border-box;
}

.category {
  padding: 10px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 6px;
  color: #cbd5e1;
}

.category:hover {
  background: #1f2937;
}

.category.active {
  background: #1e3a5f;
  color: #fff;
}

/* 主内容 */
#content {
  margin-left: 240px;
  padding: 20px;
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.header-row h2 {
  margin: 0;
}

.item {
  background: #1e293b;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
}

a {
  color: #60a5fa;
  text-decoration: none;
}

small {
  display: block;
  margin-top: 4px;
  color: #94a3b8;
}

.btn {
  padding: 8px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  background: #334155;
  color: #e2e8f0;
}

.btn:hover {
  background: #475569;
}

.btn-add {
  width: 100%;
  margin-top: 12px;
  background: #1e293b;
  border: 1px dashed #475569;
}

.btn-add:hover {
  background: #334155;
  border-color: #64748b;
}

.btn-primary {
  background: #2563eb;
  color: #fff;
}

.btn-primary:hover {
  background: #1d4ed8;
}

.form-panel {
  background: #1e293b;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
}

.form-panel.hidden {
  display: none;
}

.form-panel input {
  display: block;
  width: 100%;
  box-sizing: border-box;
  padding: 8px 10px;
  margin-bottom: 8px;
  border: 1px solid #334155;
  border-radius: 6px;
  background: #0f172a;
  color: #e2e8f0;
  font-size: 14px;
}

.form-panel input:focus {
  outline: none;
  border-color: #2563eb;
}

.form-actions {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
</style>
</head>

<body>

<div id="sidebar"></div>
<div id="content">
  <h2>请选择分类</h2>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
